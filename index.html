<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Math Hero — Ujian Matematik KSSR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #ffd6e7;
    --bg-2: #c5e3ff;
    --bg-3: #fff5cc;
    --primary: #ff5e8a;
    --primary-dark: #d63d6a;
    --secondary: #4ec5ff;
    --accent: #ffd23f;
    --success: #4ade80;
    --danger: #ef4444;
    --text: #1f1f3d;
    --muted: #6b6b8a;
    --card: #ffffff;
    --shadow: 0 8px 0 rgba(31,31,61,0.15);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Baloo 2', 'Fredoka', system-ui, sans-serif;
    color: var(--text);
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    background:
      radial-gradient(circle at 10% 20%, var(--bg-1) 0%, transparent 40%),
      radial-gradient(circle at 90% 10%, var(--bg-2) 0%, transparent 40%),
      radial-gradient(circle at 50% 90%, var(--bg-3) 0%, transparent 50%),
      #fff8fb;
    background-attachment: fixed;
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .stage {
    width: 100%;
    max-width: 560px;
    background: var(--card);
    border-radius: 28px;
    box-shadow: var(--shadow);
    padding: 20px 18px;
    position: relative;
    overflow: hidden;
  }
  .stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 100% 0%, rgba(255,210,63,0.15) 0%, transparent 35%),
      radial-gradient(circle at 0% 100%, rgba(78,197,255,0.15) 0%, transparent 35%);
    pointer-events: none;
  }
  .screen {
    position: relative;
    display: none;
    flex-direction: column;
    gap: 14px;
    animation: pop-in 0.4s ease;
  }
  .screen.active { display: flex; }
  @keyframes pop-in {
    0% { opacity: 0; transform: scale(0.95) translateY(8px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  .title {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 32px;
    text-align: center;
    margin: 0;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.5px;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-weight: 500;
    font-size: 15px;
    margin: -8px 0 8px;
  }
  .label {
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
    margin: 0 0 4px 4px;
  }
  .row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .avatar-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .body-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .body-btn {
    background: #fff;
    border: 3px solid #f0f0f5;
    border-radius: 18px;
    padding: 12px 6px;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s ease;
    color: var(--text);
    box-shadow: 0 4px 0 rgba(31,31,61,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    position: relative;
  }
  .body-btn .body-emoji { font-size: 36px; line-height: 1; }
  .body-btn .body-name { font-size: 13px; font-weight: 800; }
  .body-btn .body-class { font-size: 11px; font-weight: 700; }
  .body-btn .body-coins {
    font-size: 11px;
    color: #b45309;
    background: #fef3c7;
    padding: 1px 6px;
    border-radius: 8px;
    margin-top: 2px;
  }
  .body-btn .body-new-badge {
    display: inline-block;
    font-size: 9px;
    color: white;
    background: var(--accent);
    padding: 1px 5px;
    border-radius: 6px;
    font-weight: 800;
    margin-left: 3px;
    vertical-align: middle;
  }
  .body-btn .body-stack {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 2px;
  }
  .body-btn.selected, .grade-btn.selected {
    border-color: var(--primary);
    background: linear-gradient(135deg, #fff0f6 0%, #ffe5f0 100%);
    transform: translateY(-2px);
    box-shadow: 0 6px 0 rgba(255,94,138,0.25);
  }
  .body-btn.has-profile {
    border-color: #c4b5fd;
  }
  .welcome-card {
    background: linear-gradient(135deg, #fff5e0 0%, #ffe8d6 100%);
    border-radius: 18px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 3px solid #ffd9a8;
    margin-bottom: 4px;
  }
  .welcome-hero { display: flex; align-items: center; gap: 10px; flex: 1; }
  .welcome-emoji { font-size: 42px; line-height: 1; }
  .welcome-info { display: flex; flex-direction: column; gap: 2px; }
  .welcome-name { font-weight: 800; font-size: 16px; line-height: 1.1; }
  .welcome-class { font-size: 12px; font-weight: 700; opacity: 0.8; }
  .welcome-stats {
    display: flex;
    flex-direction: column;
    gap: 3px;
    align-items: flex-end;
    font-size: 13px;
    font-weight: 700;
    min-width: 80px;
  }
  .welcome-stat { display: flex; align-items: center; gap: 3px; }
  .welcome-stat-num { font-family: 'Fredoka', sans-serif; font-size: 17px; font-weight: 700; }
  .change-hero-btn {
    background: transparent;
    border: 2px dashed #c4a883;
    color: #8b6f47;
    border-radius: 12px;
    padding: 6px 10px;
    font-family: inherit;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    width: 100%;
    margin-top: 4px;
  }
  .change-hero-btn:hover { background: #fff5e0; border-style: solid; }
  .daily-bonus-banner {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
    color: #7a4500;
    padding: 14px 22px;
    border-radius: 18px;
    text-align: center;
    font-weight: 800;
    font-size: 16px;
    box-shadow: 0 8px 0 #c2780a, 0 12px 30px rgba(0,0,0,0.2);
    z-index: 200;
    animation: bounce 0.6s ease, fadeOut 0.5s ease 2.7s forwards;
    max-width: 90vw;
  }
  .daily-bonus-banner .streak-num {
    font-family: 'Fredoka', sans-serif;
    font-size: 22px;
  }
  @keyframes fadeOut {
    to { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  }
  .coin-float, .gem-float {
    position: fixed;
    font-family: 'Fredoka', sans-serif;
    font-weight: 800;
    font-size: 22px;
    pointer-events: none;
    z-index: 150;
    animation: float-up 1.4s ease-out forwards;
  }
  .coin-float { color: #b45309; text-shadow: 0 2px 0 #fef3c7, 0 0 12px #fbbf24; }
  .gem-float { color: #7c3aed; text-shadow: 0 2px 0 #ddd6fe, 0 0 12px #a78bfa; font-size: 28px; }
  @keyframes float-up {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    20% { opacity: 1; transform: translateY(-10px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-80px) scale(1); }
  }
  .perfect-bonus-banner {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 180;
    animation: fadeIn 0.3s ease;
  }
  .perfect-bonus-card {
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
    color: #7a4500;
    padding: 24px 28px;
    border-radius: 22px;
    text-align: center;
    box-shadow: 0 12px 0 #c2780a, 0 20px 50px rgba(0,0,0,0.3);
    animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 320px;
  }
  .perfect-bonus-emoji { font-size: 56px; }
  .perfect-bonus-title { font-family: 'Fredoka', sans-serif; font-size: 28px; font-weight: 800; margin: 6px 0; }
  .perfect-bonus-reward { font-size: 18px; font-weight: 700; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .grade-btn {
    flex: 1;
    min-width: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .grade-btn .grade-name { font-size: 22px; font-weight: 800; }
  .grade-btn .grade-desc { font-size: 12px; color: var(--muted); font-weight: 600; }
  .subject-btn {
    flex: 1;
    min-width: 130px;
    background: #fff;
    border: 3px solid #f0f0f5;
    border-radius: 18px;
    padding: 14px 8px;
    font-family: inherit;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s ease;
    color: var(--text);
    box-shadow: 0 4px 0 rgba(31,31,61,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .subject-btn .subject-emoji { font-size: 32px; line-height: 1; }
  .subject-btn .subject-name { font-size: 14px; }
  .subject-btn.selected {
    border-color: var(--secondary);
    background: linear-gradient(135deg, #e6f6ff 0%, #d0eaff 100%);
    transform: translateY(-2px);
    box-shadow: 0 6px 0 rgba(78,197,255,0.25);
  }
  .q-passage {
    font-size: 14px;
    line-height: 1.4;
    color: var(--text);
    background: #fff;
    padding: 10px 12px;
    border-radius: 12px;
    border-left: 4px solid var(--secondary);
    margin-bottom: 4px;
    font-style: italic;
    max-width: 100%;
  }
  .start-btn {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border: none;
    border-radius: 18px;
    padding: 16px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--primary-dark);
    transition: all 0.1s ease;
    width: 100%;
    letter-spacing: 0.5px;
  }
  .start-btn:active, .start-btn:hover {
    transform: translateY(3px);
    box-shadow: 0 3px 0 var(--primary-dark);
  }
  .start-btn:disabled {
    background: #d0d0e0;
    box-shadow: 0 4px 0 #b0b0c0;
    cursor: not-allowed;
  }
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: linear-gradient(135deg, #fff5e0 0%, #ffe8d6 100%);
    border-radius: 16px;
    font-weight: 700;
  }
  .hud-cell { display: flex; align-items: center; gap: 6px; font-size: 17px; }
  .hearts { letter-spacing: 2px; }
  .progress-bar {
    height: 12px;
    background: #f0f0f5;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--success) 0%, #22c55e 100%);
    border-radius: 8px;
    width: 0%;
    transition: width 0.4s ease;
    box-shadow: inset 0 -2px 0 rgba(0,0,0,0.1);
  }
  .mascot {
    font-size: 64px;
    text-align: center;
    transition: transform 0.3s ease;
    margin: 4px 0;
  }
  .mascot.happy { animation: bounce 0.5s ease; }
  .mascot.sad { animation: shake 0.4s ease; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-15px) scale(1.1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  .question-box {
    background: linear-gradient(135deg, #f7faff 0%, #eef5ff 100%);
    border-radius: 20px;
    padding: 18px;
    border: 3px solid #e0eaff;
    text-align: center;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }
  .q-num {
    font-size: 13px;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .q-text {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.3;
    margin: 4px 0;
  }
  .q-visual {
    font-size: 32px;
    letter-spacing: 1px;
    line-height: 1.4;
    word-spacing: 6px;
    word-break: break-word;
    overflow-wrap: anywhere;
    text-align: center;
    max-width: 100%;
    padding: 8px 4px;
  }
  .q-equation {
    font-size: 32px;
    font-weight: 800;
    font-family: 'Fredoka', monospace;
    color: var(--primary-dark);
  }
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .option {
    background: #fff;
    border: 3px solid #e8e8f0;
    border-radius: 16px;
    padding: 14px 10px;
    font-family: inherit;
    font-weight: 700;
    font-size: 18px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.12s ease;
    box-shadow: 0 4px 0 rgba(31,31,61,0.08);
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    text-align: center;
    line-height: 1.2;
  }
  .option-letter {
    display: inline-block;
    width: 24px;
    height: 24px;
    line-height: 24px;
    text-align: center;
    background: #f0f0f5;
    border-radius: 50%;
    font-size: 13px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .option:active, .option:hover {
    transform: translateY(2px);
    box-shadow: 0 2px 0 rgba(31,31,61,0.08);
    border-color: var(--secondary);
  }
  .option.correct {
    background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
    border-color: var(--success);
    color: #065f46;
    animation: pulse 0.4s ease;
  }
  .option.wrong {
    background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
    border-color: var(--danger);
    color: #7f1d1d;
    animation: shake 0.3s ease;
  }
  .option:disabled { cursor: default; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .feedback {
    text-align: center;
    font-weight: 700;
    font-size: 18px;
    min-height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .feedback.correct { color: var(--success); }
  .feedback.wrong { color: var(--danger); }
  .stars-row {
    display: flex;
    justify-content: center;
    gap: 4px;
    font-size: 28px;
    min-height: 36px;
  }
  .star {
    opacity: 0;
    transform: scale(0);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .star.earned {
    opacity: 1;
    transform: scale(1);
  }
  .streak-banner {
    background: linear-gradient(135deg, var(--accent) 0%, #ffb700 100%);
    color: #7a4500;
    padding: 8px 14px;
    border-radius: 14px;
    text-align: center;
    font-weight: 800;
    font-size: 15px;
    animation: bounce 0.6s ease;
    box-shadow: 0 4px 0 #cc8e00;
  }
  .end-card {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
    padding: 12px 0;
  }
  .end-emoji { font-size: 80px; animation: bounce 1s ease infinite; }
  .end-grade {
    font-family: 'Fredoka', sans-serif;
    font-size: 64px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1;
  }
  .end-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
  }
  .stat {
    background: #f7f7fb;
    border-radius: 14px;
    padding: 12px 6px;
  }
  .stat-val {
    font-family: 'Fredoka', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .end-msg {
    font-size: 17px;
    color: var(--muted);
    font-weight: 600;
    max-width: 320px;
    line-height: 1.4;
  }
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 100;
  }
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: var(--primary);
    top: -10px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
  .footer-credit {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    font-weight: 600;
  }
  @media (max-width: 380px) {
    .title { font-size: 26px; }
    .q-text { font-size: 19px; }
    .q-visual { font-size: 32px; letter-spacing: 2px; }
    .option { font-size: 16px; padding: 12px 8px; }
  }
</style>
</head>
<body>

<div class="stage">

  <!-- START SCREEN -->
  <section id="screen-start" class="screen active">
    <h1 class="title">Math Hero</h1>
    <p class="subtitle">KSSR Quest — Belajar Sambil Main!</p>

    <div>
      <p class="label" id="body-label">Pilih hero kamu:</p>
      <div class="body-grid" id="body-grid"></div>
    </div>

    <div id="welcome-card" style="display: none;">
      <div class="welcome-hero">
        <span class="welcome-emoji" id="welcome-emoji">🦊</span>
        <div class="welcome-info">
          <span class="welcome-name" id="welcome-name">Fox Knight</span>
          <span class="welcome-class" id="welcome-class">⚔️ Warrior</span>
        </div>
        <div class="welcome-stats">
          <span class="welcome-stat"><span class="welcome-stat-num" id="welcome-coins">0</span>🪙</span>
          <span class="welcome-stat"><span class="welcome-stat-num" id="welcome-gems">0</span>💎</span>
          <span class="welcome-stat">🔥<span class="welcome-stat-num" id="welcome-streak">0</span></span>
        </div>
      </div>
      <button class="change-hero-btn" id="change-hero-btn">🔄 Ganti Hero</button>
    </div>

    <div>
      <p class="label">Pilih darjah:</p>
      <div class="row">
        <button class="grade-btn" data-grade="1">
          <span class="grade-name">Darjah 1</span>
          <span class="grade-desc">Mudah · 7 tahun</span>
        </button>
        <button class="grade-btn" data-grade="3">
          <span class="grade-name">Darjah 3</span>
          <span class="grade-desc">Sederhana · 9 tahun</span>
        </button>
      </div>
    </div>

    <div id="subject-section" style="display: none;">
      <p class="label">Pilih subjek:</p>
      <div class="row" id="subject-grid">
        <button class="subject-btn" data-subject="math">
          <span class="subject-emoji">🔢</span>
          <span class="subject-name">Matematik</span>
        </button>
        <button class="subject-btn" data-subject="bm">
          <span class="subject-emoji">🇲🇾</span>
          <span class="subject-name">Bahasa Melayu</span>
        </button>
        <button class="subject-btn" data-subject="bi">
          <span class="subject-emoji">🇬🇧</span>
          <span class="subject-name">English</span>
        </button>
        <button class="subject-btn" data-subject="sains">
          <span class="subject-emoji">🔬</span>
          <span class="subject-name">Sains</span>
        </button>
      </div>
    </div>

    <button class="start-btn" id="start-btn" disabled>Pilih semua dulu ✨</button>
    <p class="footer-credit">Buat cikgu Adeen & anak-anak ❤️</p>
  </section>

  <!-- GAME SCREEN -->
  <section id="screen-game" class="screen">
    <div class="hud">
      <div class="hud-cell"><span>⭐</span><span id="hud-stars">0</span></div>
      <div class="hud-cell"><span>🪙</span><span id="hud-coins">0</span></div>
      <div class="hud-cell"><span>💎</span><span id="hud-gems">0</span></div>

<script>
/* ===========================
   SOUND MANAGER (Web Audio API)
   =========================== */
const Sound = (() => {
  let ctx = null;
  const ensure = () => {
    if (!ctx) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { ctx = null; }
    }
    if (ctx && ctx.state === 'suspended') ctx.resume();
    return ctx;
  };
  const tone = (freq, dur, type = 'sine', vol = 0.15) => {
    const c = ensure();
    if (!c) return;
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, c.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    osc.connect(gain);
    gain.connect(c.destination);
    osc.start();
    osc.stop(c.currentTime + dur);
  };
  return {
    click: () => tone(800, 0.05, 'square', 0.05),
    correct: () => {
      tone(660, 0.1, 'sine', 0.18);
      setTimeout(() => tone(880, 0.15, 'sine', 0.18), 80);
    },
    wrong: () => tone(180, 0.25, 'sawtooth', 0.15),
    streak: () => {
      [523, 659, 784, 1047].forEach((f, i) =>
        setTimeout(() => tone(f, 0.12, 'sine', 0.2), i * 70)
      );
    },
    end: () => {
      [523, 659, 784].forEach((f, i) =>
        setTimeout(() => tone(f, 0.2, 'triangle', 0.2), i * 150)
      );
    },
  };
})();

/* ===========================
   BODIES (RPG hero creatures — each is a profile)
   =========================== */
const BODIES = [
  { id: 'fox', emoji: '🦊', name: 'Fox Knight',  cls: 'Warrior',  icon: '⚔️', color: '#ef4444' },
  { id: 'cat', emoji: '🐱', name: 'Cat Mage',    cls: 'Mage',     icon: '🪄', color: '#8b5cf6' },
  { id: 'panda', emoji: '🐼', name: 'Panda Monk', cls: 'Monk',     icon: '☯️', color: '#10b981' },
  { id: 'tiger', emoji: '🐯', name: 'Tiger Warrior', cls: 'Berserker', icon: '🗡️', color: '#f59e0b' },
  { id: 'dragon', emoji: '🐉', name: 'Dragon Child', cls: 'Mystic', icon: '🔥', color: '#dc2626' },
  { id: 'unicorn', emoji: '🦄', name: 'Unicorn Sage', cls: 'Healer', icon: '💖', color: '#ec4899' },
];

/* ===========================
   PROFILE MODULE — LocalStorage per body
   =========================== */
const PROFILE_KEY = (bodyId) => `math-hero-profile-${bodyId}`;

function createProfile(bodyId) {
  const b = BODIES.find(x => x.id === bodyId);
  return {
    body: bodyId,
    bodyName: b.name, bodyEmoji: b.emoji, bodyClass: b.cls, classIcon: b.icon, classColor: b.color,
    coins: 0, gems: 0,
    equipped: { background: null, headgear: null, top: null, cape: null, hand: null, pet: null },
    inventory: {},
    totalCorrect: 0, totalGames: 0, bestStreak: 0, perfectScores: 0,
    lastPlayDate: null, loginStreakDays: 0,
    createdAt: new Date().toISOString(),
  };
}

function saveProfile(p) {
  try { localStorage.setItem(PROFILE_KEY(p.body), JSON.stringify(p)); }
  catch (e) { console.warn('Profile save failed:', e); }
}
function loadProfile(bodyId) {
  try {
    const raw = localStorage.getItem(PROFILE_KEY(bodyId));
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
function deleteProfile(bodyId) {
  localStorage.removeItem(PROFILE_KEY(bodyId));
}

/* ===========================
   DAILY BONUS — first open of each day
   =========================== */
function checkDailyBonus(p) {
  const today = new Date().toISOString().split('T')[0];
  if (p.lastPlayDate === today) {
    return { isNewDay: false, coins: 0, gems: 0, streak: p.loginStreakDays };
  }
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  const consecutive = p.lastPlayDate === yesterday;
  p.loginStreakDays = consecutive ? p.loginStreakDays + 1 : 1;
  p.lastPlayDate = today;
  const streak = p.loginStreakDays;
  const coins = 5 + (streak >= 7 ? 5 : 0);
  const gems = streak >= 7 ? 1 : 0;
  p.coins += coins;
  p.gems += gems;
  saveProfile(p);
  return { isNewDay: true, coins, gems, streak };
}

/* ===========================
   CURRENCY FLOAT ANIMATIONS
   =========================== */
function showFloat(text, kind = 'coin', x = null, y = null) {
  const el = document.createElement('div');
  el.className = kind === 'gem' ? 'gem-float' : 'coin-float';
  el.textContent = text;
  const cx = x ?? (window.innerWidth / 2);
  const cy = y ?? (window.innerHeight / 2);
  el.style.left = `${cx - 30}px`;
  el.style.top = `${cy}px`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

function showDailyBonusBanner(bonus) {
  const b = document.createElement('div');
  b.className = 'daily-bonus-banner';
  b.innerHTML = `🎁 Hari ke-<span class="streak-num">${bonus.streak}</span>! +${bonus.coins} 🪙${bonus.gems ? ` +${bonus.gems} 💎` : ''}`;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3300);
  Sound.streak();
}

function showPerfectBonusModal(coins, gems) {
  const m = document.createElement('div');
  m.className = 'perfect-bonus-banner';
  m.innerHTML = `<div class="perfect-bonus-card">
    <div class="perfect-bonus-emoji">🏆</div>

  </div>`;
  document.body.appendChild(m);
  Sound.streak();
  setTimeout(() => m.remove(), 2400);
}

/* ===========================
   QUESTION LOADER — fetches JSON from /data/
   =========================== */
const BANKS = {};
async function loadBank(grade, subject) {
  const key = `${grade}-${subject}`;
  if (BANKS[key]) return BANKS[key];
  const url = `data/d${grade}-${subject}.json`;
  const r = await fetch(url, { cache: 'force-cache' });
  if (!r.ok) throw new Error(`Failed to load ${url}: ${r.status}`);
  const data = await r.json();
  BANKS[key] = data;
  return data;
}

/* ===========================
   GAME STATE
   =========================== */
const state = {
  profile: null,
  grade: null,
  subject: null,
  subjectName: null,
  questions: [],
  index: 0,
  lives: 3,
  stars: 0,
  streak: 0,
  bestStreak: 0,
  correct: 0,
  qStartTime: 0,
  locked: false,
  coinsEarned: 0,
  gemsEarned: 0,
};

/* ===========================
   ELEMENTS
   =========================== */
const el = (id) => document.getElementById(id);
const screens = {
  start: el('screen-start'),
  game: el('screen-game'),
  end: el('screen-end'),
};

/* ===========================
   START SCREEN — body picker + welcome card
   =========================== */
function renderBodies() {
  const grid = el('body-grid');
  grid.innerHTML = '';
  BODIES.forEach(b => {
    const existing = loadProfile(b.id);

    if (existing) btn.classList.add('has-profile');

      ${existing
        ? `<div class="body-stack"><span class="body-coins">${existing.coins} 🪙 · ${existing.gems} 💎</span></div>`
        : `<div class="body-stack"><span class="body-coins">0 🪙 · 0 💎</span><span class="body-new-badge">BARU</span></div>`}
    `;

}

function selectBody(bodyId) {

    setTimeout(() => showDailyBonusBanner(bonus), 300);

}

});

document.querySelectorAll('.grade-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.grade = parseInt(btn.dataset.grade, 10);
    state.subject = null;
    state.subjectName = null;

    document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');

document.querySelectorAll('.subject-btn').forEach(btn => {

function updateStartBtn() {
  const ok = state.profile && state.grade && state.subject;
  el('start-btn').disabled = !ok;
  el('start-btn').textContent = ok ? 'Mula Main! 🚀' : 'Pilih semua dulu ✨';
}

el('start-btn').addEventListener('click', startGame);

/* ===========================
   GAME FLOW
   =========================== */
async function startGame() {
  if (!state.profile || !state.grade || !state.subject) return;
  Sound.click();
  const btn = el('start-btn');
  btn.disabled = true;
  btn.textContent = 'Memuat soalan... ⏳';
  try {
    const bank = await loadBank(state.grade, state.subject);
    state.questions = shuffle([...bank.questions]);
    state.index = 0;
    state.lives = 3;
    state.stars = 0;
    state.streak = 0;
    state.bestStreak = 0;
    state.correct = 0;
    state.coinsEarned = 0;
    state.gemsEarned = 0;
    showScreen('game');
    renderQuestion();
  } catch (e) {
    alert('Maaf, soalan tidak dapat dimuatkan. Cuba lagi ya!\n\n' + e.message);
    btn.disabled = false;
    updateStartBtn();
  }
}

function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Group emoji visuals into rows of 5 for easy counting (KSSR standard).
// Each emoji is a single grapheme cluster (e.g. 🍎 is 1), so we walk the string
// using Array.from which respects Unicode code points.
function formatVisual(s) {
  if (!s) return '';
  const chars = Array.from(s);
  if (chars.length <= 5) return chars.join('');
  const rows = [];
  for (let i = 0; i < chars.length; i += 5) {
    rows.push(chars.slice(i, i + 5).join(''));
  }
  return rows.join('<br>');
}

function renderQuestion() {
  state.locked = false;
  state.qStartTime = Date.now();
  const q = state.questions[state.index];

  el('q-num').textContent = `Soalan ${state.index + 1} / ${state.questions.length} · ${state.subjectName || ''}`;
  el('q-text').textContent = q.text;
  el('q-visual').innerHTML = q.visual ? formatVisual(q.visual) : '';
  el('q-visual').style.display = q.visual ? 'block' : 'none';
  el('q-equation').textContent = q.equation ? q.equation : '';
  el('q-equation').style.display = q.equation ? 'block' : 'none';
  el('q-passage').textContent = q.passage || '';
  el('q-passage').style.display = q.passage ? 'block' : 'none';

  const optsEl = el('options');
  optsEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  const shuffledOpts = shuffle([...q.options]);
  shuffledOpts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.dataset.value = opt;
    btn.addEventListener('click', () => handleAnswer(btn, opt));
    optsEl.appendChild(btn);
  });

  el('feedback').textContent = '';
  el('feedback').className = 'feedback';
  document.querySelectorAll('#stars-row .star').forEach(s => s.classList.remove('earned'));
  el('mascot').className = 'mascot';
  el('mascot').textContent = state.profile ? state.profile.bodyEmoji : '🦊';

  updateHud();
}

function updateHud() {
  el('hud-stars').textContent = state.stars;
  el('hud-coins').textContent = state.profile ? state.profile.coins : 0;
  el('hud-gems').textContent = state.profile ? state.profile.gems : 0;
  el('hud-hearts').textContent = '❤️'.repeat(state.lives) + '🖤'.repeat(3 - state.lives);
  el('hud-streak').textContent = state.streak;
  const pct = ((state.index) / state.questions.length) * 100;
  el('progress-fill').style.width = `${pct}%`;
}

function handleAnswer(btn, chosen) {
  if (state.locked) return;
  state.locked = true;
  Sound.click();

  const q = state.questions[state.index];
  const correct = String(chosen) === String(q.answer);
  const elapsed = (Date.now() - state.qStartTime) / 1000;

  document.querySelectorAll('.option').forEach(b => {
    b.disabled = true;
    if (String(b.dataset.value) === String(q.answer)) {
      b.classList.add('correct');
    }
  });
  if (!correct) {
    btn.classList.add('wrong');
    state.lives -= 1;
    state.streak = 0;
    el('mascot').classList.add('sad');
    el('mascot').textContent = '😢';
    el('feedback').textContent = `❌ Jawapan betul: ${q.answer}`;
    el('feedback').className = 'feedback wrong';
    Sound.wrong();
  } else {
    state.correct += 1;
    state.streak += 1;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    el('mascot').classList.add('happy');
    el('mascot').textContent = '😄';
    Sound.correct();

    // Award coins for correct answer
    if (state.profile) {
      state.profile.coins += 1;
      state.profile.totalCorrect += 1;
      state.coinsEarned += 1;
      saveProfile(state.profile);
      showFloat('+1 🪙', 'coin');
    }

    let starsThisQ = 1;
    if (elapsed < 10) starsThisQ = 3;
    else if (elapsed < 20) starsThisQ = 2;
    state.stars += starsThisQ;

    document.querySelectorAll('#stars-row .star').forEach((s, i) => {
      if (i < starsThisQ) {
        setTimeout(() => s.classList.add('earned'), i * 200);
      }
    });

    // Streak milestone bonuses (5, 10, 15...)
    if (state.streak > 0 && state.streak % 5 === 0 && state.profile) {
      const isTenth = state.streak % 10 === 0;
      const bonusCoins = isTenth ? 3 : 2;
      const bonusGems = isTenth ? 1 : 0;
      state.profile.coins += bonusCoins;
      state.profile.gems += bonusGems;
      state.coinsEarned += bonusCoins;
      state.gemsEarned += bonusGems;
      saveProfile(state.profile);
      Sound.streak();
      showStreakBanner(state.streak, bonusCoins, bonusGems);
      if (bonusGems > 0) showFloat(`+${bonusGems} 💎`, 'gem');
    }
    el('feedback').textContent = `✅ Betul! +${starsThisQ} ⭐ +1 🪙`;
    el('feedback').className = 'feedback correct';
  }

  updateHud();

  setTimeout(() => {
    if (state.lives <= 0) {
      endGame();
      return;
    }
    state.index += 1;
    if (state.index >= state.questions.length) {
      endGame();
    } else {
      renderQuestion();
    }
  }, correct ? 1600 : 1400);
}

function showStreakBanner(n, bonusCoins = 2, bonusGems = 0) {
  const banner = document.createElement('div');
  banner.className = 'streak-banner';
  banner.textContent = `🔥 Streak ${n}x! +${bonusCoins} 🪙${bonusGems ? ` +${bonusGems} 💎` : ''}`;
  banner.style.position = 'fixed';
  banner.style.top = '40px';
  banner.style.left = '50%';
  banner.style.transform = 'translateX(-50%)';
  banner.style.zIndex = '50';
  banner.style.maxWidth = '90%';
  document.body.appendChild(banner);
  setTimeout(() => banner.remove(), 2200);
}

/* ===========================
   END SCREEN
   =========================== */
function endGame() {
  showScreen('end');
  Sound.end();
  const total = state.questions.length;
  const pct = state.correct / total;
  let grade, emoji, msg;
  if (pct >= 0.9) { grade = 'A+'; emoji = '🏆'; msg = 'Cemerlang! Terus jadi jaguh!'; }
  else if (pct >= 0.75) { grade = 'A'; emoji = '🌟'; msg = 'Bagus sangat! Cuba lagi untuk A+!'; }
  else if (pct >= 0.6) { grade = 'B'; emoji = '😊'; msg = 'Baik! Sedikit usaha lagi untuk A!'; }
  else if (pct >= 0.4) { grade = 'C'; emoji = '💪'; msg = 'Jangan give up. Cuba lagi, boleh jadi lebih baik!'; }
  else { grade = 'D'; emoji = '🤗'; msg = 'Setiap juara bermula dari kosong. Cuba lagi ya!'; }

  // Perfect score bonus
  if (state.profile && state.correct === total) {
    state.profile.coins += 5;
    state.profile.gems += 1;
    state.profile.perfectScores += 1;
    state.coinsEarned += 5;
    state.gemsEarned += 1;
    saveProfile(state.profile);
    setTimeout(() => showPerfectBonusModal(5, 1), 600);
  }

  if (state.profile) {
    state.profile.totalGames += 1;
    if (state.bestStreak > state.profile.bestStreak) {
      state.profile.bestStreak = state.bestStreak;
    }
    saveProfile(state.profile);
  }

  el('end-grade').textContent = grade;
  el('end-emoji').textContent = emoji;
  el('end-msg').textContent = msg;
  el('end-correct').textContent = `${state.correct}/${total}`;
  el('end-stars').textContent = state.stars;
  el('end-best-streak').textContent = state.bestStreak;

  if (pct >= 0.9) {
    setTimeout(fireConfetti, 400);
  }
}

el('replay-btn').addEventListener('click', () => {
  Sound.click();
  startGame();
});
el('home-btn').addEventListener('click', () => {
  Sound.click();
  state.profile = null;
  state.grade = null;
  state.subject = null;
  state.subjectName = null;
  document.querySelectorAll('.body-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('subject-section').style.display = 'none';
  el('welcome-card').style.display = 'none';
  el('body-label').textContent = 'Pilih hero kamu:';
  renderBodies(); // refresh coin displays
  updateStartBtn();
  showScreen('start');
});

/* ===========================
   CONFETTI
   =========================== */
function fireConfetti() {
  const container = el('confetti');
  container.innerHTML = '';
  const colors = ['#ff5e8a', '#4ec5ff', '#ffd23f', '#4ade80', '#a78bfa'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    container.appendChild(piece);
  }
  setTimeout(() => { container.innerHTML = ''; }, 4000);
}

/* ===========================
   INIT
   =========================== */
renderBodies();
updateStartBtn();

// Disable double-tap zoom on iOS
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });
</script>
